next-version: 0.1.0
mode: ContinuousDelivery
tag-prefix: '[vV]?'
strategies:
  - Fallback
  - ConfiguredNextVersion
branches:
  main:
    increment: Patch
    label: ''
  pull-request:
    increment: Patch
    label: PullRequest
  unknown:
    regex: ^(?<BranchName>.+)$
    increment: Patch
    label: '{BranchName}'
    source-branches: []
