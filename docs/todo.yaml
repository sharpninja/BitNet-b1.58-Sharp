  - id: IMPL-TRITPACK-001
    title: 'Fix 6: Base-3 trit packing (5 trits per byte)'
    done: true
    completed: 2026-04-14
    description:
    - 'Pack 5 ternary weights per byte: base-3 encoding (3^5=243 fits in byte)'
    - 1.6 bits/weight vs 8 - within 0.5pct of information-theoretic minimum
    - 'LUT decode: precompute all 243 packed values at static init'
    - Change BitLinear storage from sbyte[] to packed byte[]
    - 'Update serialization: GGUF, checkpoint, migration on load for legacy artifacts'
    done-summary: TritPacking with LUT decode, per-row packed byte[] storage in BitLinear, 5x memory reduction. 14 TritPacking tests + all 149 tests pass. Commit 73e5e2a.
    technical-details:
    - 'New: src/BitNetSharp.Core/Quantization/TritPacking.cs'
    - 'Also modify: GgufFile.cs, BitNetPaperGguf.cs, BitNetPaperCheckpoint.cs'
    - packed = t0 + 3*t1 + 9*t2 + 27*t3 + 81*t4 where trit = ternary + 1
    - Forward() unpacks row to temp buffer then runs SIMD unchanged
    - Legacy artifacts must load via migration-on-load not breaking existing formats
    - New format metadata or versioning to distinguish packed from unpacked
    depends-on:
