  high-priority:
  - id: IMPL-BITLINEAR-001
    title: 'Fix 1: Eliminate float multiply in BitLinear.Forward()'
    done: true
    completed: 2026-04-14
    description:
    - Replace float multiply with conditional add/subtract/skip in BitLinear.Forward() inner loop
    - Line 52 does float multiply for ternary weights that are only -1/0/+1
    - Eliminates core inefficiency that wastes ternary weight advantage
    done-summary: Replaced float multiply with conditional add/subtract/skip. 3 new tests. Commit 37bead6.
    technical-details:
    - 'File: src/BitNetSharp.Core/Layers/BitLinear.cs'
    - sbyte weight promotes to float - full FP multiply for values only -1/0/+1
    - Zero case (50pct of weights) is implicit fall-through
    - Numerical equivalence is exact
    functional-requirements:
    - Output numerically identical
    technical-requirements:
    - No public API changes
    - TreatWarningsAsErrors clean
    implementation-tasks:
    - task: 'Write regression tests: golden-value, all-zero, mixed ternary'
      done: false
    - task: Replace inner loop body with conditional add/subtract
      done: false
    - task: Verify existing tests still pass and clean build
      done: false
